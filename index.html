<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Web ducanh test</title>

<style>

body{
margin:0;
font-family: Arial;
background:#f3f3f3;
}

/* header */
.header{
background: linear-gradient(135deg,#4f46e5,#d946ef);
color:white;
text-align:center;
padding:120px 20px;
border-bottom-left-radius:80px;
border-bottom-right-radius:80px;
}

.header h1{
font-size:50px;
margin:10px;
}

.header p{
opacity:0.8;
}

/* container */
.container{
padding:40px;
text-align:center;
}

/* card */
.cards{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.card{
background:white;
width:220px;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card h3{
margin-top:10px;
}

.btn{
display:inline-block;
margin-top:15px;
padding:10px 20px;
border:none;
background:linear-gradient(135deg,#4f46e5,#d946ef);
color:white;
border-radius:10px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
<h1>Ôn thi Tuyển sinh vào 10 nhé</h1>
<p>Ko được tra goolge nha — Chấm điểm tự động</p>
</div>

<div class="container">

<h2>Chọn đề thi</h2>

<div class="cards">

<div class="card">
<h3>Test tiếng anh</h3>
<p>90 phút • 50 câu</p>
<button class="btn">Bắt đầu</button>
</div>

<div class="card">
<h3>Test ngữ văn</h3>
<p>90 phút • 50 câu</p>
<button class="btn">Bắt đầu</button>
</div>

<div class="card">
<h3>Test toán</h3>
<p>90 phút • 50 câu</p>
<button class="btn">Bắt đầu</button>
</div>

<div class="card">
<h3>Test hoá học</h3>
<p>90 phút • 50 câu</p>
<button class="btn">Bắt đầu</button>
</div>

</div>

</div>

</body>

</html>
